# The ck3-tiger.conf file is in standard Paradox script format.
# It should be placed in the top directory of your mod.

languages = {
	# This will check only english and german localizations
	#check = "english"
	#check = "german"

	# If you DON'T specify any check languages, you can instead say which ones to skip.
	#skip = "french"
	#skip = "spanish"

	# If you don't specify anything in languages, the validator will check all languages.
}

# Allows configuring what reports are printed by CK3-Tiger.
filter = {

    # Whether to report about problems in vanilla game files.
    # Setting this to 'yes' results in a LOT of spam.
    # Optional boolean value, defaults to no.
    show_vanilla = no

    # Whether to report about problems in mods loaded via the load_mod sections.
    # Optional boolean value, defaults to no.
    show_loaded_mods = no

    # Contains rules for reports, using trigger syntax.
    # Only reports matching the trigger will be printed.
    # The root trigger is an AND block, just like any other trigger.
    trigger = {
        # For more information, there is a guide at: ck3-tiger/filter.md

        # In short, valid trigger keys are:
        # - always = yes/no
        # - NOT, AND, OR, NAND, NOR
        # - severity
        # - confidence
        # - key
        # - file
        # - text
        # - ignore_keys_in_files

 		# Only print warnings and errors
		severity >= Warning
		# Don't print reports that are likely false positives
		confidence >= Reasonable

		NAND = {
			key = missing-item
			text = "trait flag carn_no_consequences_for_extramarital_sex_with_me not defined in common/traits/"
			file = common/scripted_triggers/carn_adultery_triggers.txt
		}
		NAND = {
			key = missing-item
			OR = {
				text = "trait flag immune_to_disease not defined in common/traits/"
				text = "trait flag immune_to_std not defined in common/traits/"
				text = "trait flag can_use_abduct_scheme not defined in common/traits/"
			}
		}
		NAND = {
			key = scopes
			text = "`progress_towards_friend_effect` expects root to be character but root seems to be none"
			file = common/character_interactions/zzz_carn_00_grant_titles_interaction_overwrite.txt
		}
		NAND = { # Vanilla scope issues
			key = scopes
			OR = {
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:target to be landed title but scope:target seems to be character"
				text = "`agent_groups_target_character_perspective_value` expects scope:target to be landed title but scope:target seems to be character"
			}
			file = common/schemes/scheme_types/carn_abduct_scheme_override.txt
		}
		NAND = { # Vanilla scope issues (likely false positives)
			key = strict-scopes
			OR = {
				text = "`secrecy_base_value` expects scope:councillor_liege to be set"
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:scheme to be set"
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:target to be set"
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:owner to be set"
			}
			file = common/schemes/scheme_types/carn_abduct_scheme_override.txt
		}
		NAND = { # missing english localization keys in religions
			key = missing-localization
			text = "missing english localization key"
			file = common/religion/religion_types/00_agot_the_pact.txt
		}
		NAND = { # TitleItem.GetTitle.IsNomad should be ok
			key = datafunctions
			text = "wrong number of arguments for macro"
			file = gui/window_character.gui
		}
		NAND = { # Missing perspective warnings (vanilla issue)
			key = missing-perspective
		}

		# False positives due to tiger not updated to 1.19.x
		NAND = { # Doctrine parameters moved to common/religion/doctrine_types/
			key = missing-item
			text = " not defined in common/religion/doctrines/"
		}
		NAND = { # Religion families moved to common/religion/religion_family_types/
			key = missing-item
			text = " not defined in common/religion/religion_families/"
		}
		NAND = { # Religions moved to common/religion/religion_types/
			key = missing-item
			text = " not defined in common/religion/religions/"
		}
		NAND = { # New triggers, effects, etc.
			key = unknown-field
			OR = {
				# Triggers
				text = "unknown token `has_house_aspiration_parameter`"
				text = "unknown token `is_knight_permitted`"
				text = "unknown token `impact_house_relation`"
			}
		}
		NAND = { # Moved doctrines, tenets, etc.
			key = unknown-field
			OR = {
				# Doctrines
				text = "unknown token `doctrine_clerical_gender_female_only`"
				text = "unknown token `doctrine_clerical_gender_male_only`"
				text = "unknown token `doctrine_consanguinity_aunt_nephew_and_uncle_niece`"
				text = "unknown token `doctrine_consanguinity_cousins`"
				text = "unknown token `doctrine_consanguinity_dynastic`"
				text = "unknown token `doctrine_consanguinity_restricted`"
				text = "unknown token `doctrine_consanguinity_siblings`"
				text = "unknown token `doctrine_kinslaying_shunned`"
				text = "unknown token `doctrine_spiritual_head`"
				text = "unknown token `doctrine_theocracy_temporal`"
				text = "unknown token `doctrine_consanguinity_unrestricted`"
				text = "unknown token `doctrine_consanguinity_siblings`"
				text = "unknown token `doctrine_gender_equal`"
				text = "unknown token `doctrine_gender_female_dominated`"
				# Carnalitas doctrines
				text = "unknown token `carn_doctrine_"
				text = "unknown token `doctrine_slavery_accepted`"
				text = "unknown token `doctrine_slavery_crime`"
				text = "unknown token `doctrine_slavery_indentured`"
				text = "unknown token `doctrine_slavery_thralls`"
				# Tenets
				text = "unknown token `tenet_natural_primitivism`"
			}
		}
		NAND = { # New datafunctions
			key = datafunctions
			OR = {
				text = "unknown datafunction OpenBarbershop"
			}
		}
	}
}

# Use a load_mod section to tell ck3-tiger to load another mod before this one.
# This is useful when making submods or compatibility patch mods.
# You can have multiple load_mod sections.
load_mod = {
	# The label will be used in the error output to mark files from this mod
	label = "AGOT"
	# The path to the mod's .mod file. Use forward slashes.
	modfile = "../agot/agot.mod"
}
load_mod = {
	# The label will be used in the error output to mark files from this mod
	label = "carnalitas"
	# The path to the mod's .mod file. Use forward slashes.
	modfile = "../carnalitas/descriptor.mod"
}

