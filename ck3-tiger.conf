# The ck3-tiger.conf file is in standard Paradox script format.
# It should be placed in the top directory of your mod.

languages = {
	# This will check only english and german localizations
	#check = "english"
	#check = "german"

	# If you DON'T specify any check languages, you can instead say which ones to skip.
	#skip = "french"
	#skip = "spanish"

	# If you don't specify anything in languages, the validator will check all languages.
}

# Allows configuring what reports are printed by CK3-Tiger.
filter = {

    # Whether to report about problems in vanilla game files.
    # Setting this to 'yes' results in a LOT of spam.
    # Optional boolean value, defaults to no.
    show_vanilla = no

    # Whether to report about problems in mods loaded via the load_mod sections.
    # Optional boolean value, defaults to no.
    show_loaded_mods = no

    # Contains rules for reports, using trigger syntax.
    # Only reports matching the trigger will be printed.
    # The root trigger is an AND block, just like any other trigger.
    trigger = {
        # For more information, there is a guide at: ck3-tiger/filter.md

        # In short, valid trigger keys are:
        # - always = yes/no
        # - NOT, AND, OR, NAND, NOR
        # - severity
        # - confidence
        # - key
        # - file
        # - text
        # - ignore_keys_in_files

 		# Only print warnings and errors
		severity >= Warning
		# Don't print reports that are likely false positives
		confidence >= Reasonable

		NAND = {
			key = missing-item
			text = "trait flag carn_no_consequences_for_extramarital_sex_with_me not defined in common/traits/"
			file = common/scripted_triggers/carn_adultery_triggers.txt
		}
		NAND = {
			key = missing-item
			OR = {
				text = "trait flag immune_to_disease not defined in common/traits/"
				text = "trait flag immune_to_std not defined in common/traits/"
				text = "trait flag can_use_abduct_scheme not defined in common/traits/"
			}
		}
		NAND = {
			key = scopes
			text = "`progress_towards_friend_effect` expects root to be character but root seems to be none"
			file = common/character_interactions/zzz_carn_00_grant_titles_interaction_overwrite.txt
		}
		NAND = { # Vanilla scope issues
			key = scopes
			OR = {
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:target to be landed title but scope:target seems to be character"
				text = "`agent_groups_target_character_perspective_value` expects scope:target to be landed title but scope:target seems to be character"
			}
			file = common/schemes/scheme_types/carn_abduct_scheme_override.txt
		}
		NAND = { # Vanilla scope issues (likely false positives)
			key = strict-scopes
			OR = {
				text = "`secrecy_base_value` expects scope:councillor_liege to be set"
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:scheme to be set"
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:target to be set"
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:owner to be set"
			}
			file = common/schemes/scheme_types/carn_abduct_scheme_override.txt
		}
		NAND = { # missing english localization keys in religions
			key = missing-localization
			text = "missing english localization key"
			file = common/religion/religions/00_agot_the_pact.txt
		}

		# Ignore false positives because not yet updated to 1.18
		NAND = { # government flags not detected properly due to new syntax
			key = missing-item
			OR = {
				text = "government flag government_is_clan not defined in common/governments/"
				text = "government flag government_is_nomadic not defined in common/governments/"
				text = "government flag government_is_settled not defined in common/governments/"
				text = "government flag government_is_administrative not defined in common/governments/"
				text = "government flag government_is_landless_adventurer not defined in common/governments/"
				text = "government flag government_is_tribal not defined in common/governments/"
				text = "government flag government_is_theocracy not defined in common/governments/"
				text = "government flag government_is_herder not defined in common/governments/"
				text = "government flag government_is_celestial not defined in common/governments/"
				text = "government flag government_is_republic not defined in common/governments/"
				text = "government flag government_has_merit not defined in common/governments/"
				text = "government flag government_is_nw not defined in common/governments/"
				text = "title h_china not defined in common/landed_titles/"
			}
		}
		NAND = {
			key = missing-item
			text = "doctrine sunset_hostility_doctrine not defined in common/religion/doctrines/"
		}
		NAND = { # New tokens
			key = unknown-field
			OR = {
				text = "unknown token `vassal_stance`"
				text = "unknown token `title_tier`"
				text = "unknown token `min_appointment_tier`"
				text = "unknown token `main_administrative_tier`"
				text = "unknown token `merit_level`"
				text = "unknown token `has_house_power_parameter`"
				text = "unknown token `is_valid_agent_standard_trigger`"
				text = "unknown token `any_house_relation`"
				text = "unknown token `set_house_relation`"
				text = "unknown token `has_house_relation_level`"
				text = "unknown token `change_house_relation_level`"
				text = "unknown token `random_relation_house`"
				text = "unknown token `clear_house_relation`"
				text = "unknown token `is_available_quick`"
				text = "unknown token `has_house_relation_with`"
				text = "unknown token `house_dynasty`"
			}
		}
		NAND = { # New syntax secret_type => type, etc. 
			key = validation
			OR = {
				text = "`type = ` is only for `any_court_position_holder` or `any_relation`"
				text = "`type = ` is only for `random_court_position_holder` or `random_relation`"
				text = "`type = ` is only for `every_court_position_holder` or `every_relation`"
			}
		}
		NAND = { # Renamed fields, e.g. type => target in amenity_level
			key = field-missing
			OR = {
				text = "required field `type` missing"
			}
			OR = {
				file = common/courtier_guest_management/guest_management.txt
			}
		}
		NAND = { # Temporary scopes set by TGP scripted effects
			key = strict-scopes
			OR = {
				text = " expects scope:other_house_temp to be set"
				text = " expects scope:relation_temp to be set"
			}
			file = common/scripted_effects/10_dlc_tgp_house_relation_scripted_effects.txt
		}
		NAND = {
			key = strict-scopes
			OR = {
				text = "`hostile_scheme_monthly_discovery_chance_effect` expects scope:target_character to be set"
			}
			file = common/scripted_effects/00_scheme_scripted_effects.txt
		}
		NAND = {
			key = datafunctions
			OR = {
				text = "unknown datafunction ShouldShowRadiance"
				text = "unknown datafunction GetRadianceBreakdown"
				text = "unknown datafunction GetRadianceValueNoTooltip"
				text = "unknown datafunction HasTreasury"
				text = "unknown datafunction GetTreasury"
				text = "unknown datafunction GetTreasuryTooltipWithBalance"
				text = "unknown datafunction GetNameAtDateNoTooltip"
				text = "unknown datafunction ShouldShowLegitimacy"
				text = "unknown datafunction ShouldShowMerit"
				text = "unknown datafunction GetMeritItem"
				text = "unknown datafunction HasBarterGoods"
				text = "unknown datafunction GetBarterGoodsTooltipWithBalance"
				text = "unknown datafunction GetHouseRelationWith"
				text = "GetType cannot follow a Confederation promote"
				text = "wrong number of arguments for macro"
			}
		}
	}
}

# Use a load_mod section to tell ck3-tiger to load another mod before this one.
# This is useful when making submods or compatibility patch mods.
# You can have multiple load_mod sections.
load_mod = {
	# The label will be used in the error output to mark files from this mod
	label = "AGOT"
	# The path to the mod's .mod file. Use forward slashes.
	modfile = "../agot/agot.mod"
}
load_mod = {
	# The label will be used in the error output to mark files from this mod
	label = "carnalitas"
	# The path to the mod's .mod file. Use forward slashes.
	modfile = "../carnalitas/descriptor.mod"
}

#characters = {
